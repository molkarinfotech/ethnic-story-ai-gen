<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Compact mandala mark for favicon -->
  <circle cx="16" cy="16" r="14" stroke="#8B1A4A" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- 8 petals -->
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(45 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(135 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(225 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(270 16 16)"/>
  <ellipse cx="16" cy="5.5" rx="2.2" ry="4.5" fill="#8B1A4A" opacity="0.65" transform="rotate(315 16 16)"/>
  <!-- Centre -->
  <circle cx="16" cy="16" r="4.5" fill="#8B1A4A"/>
  <circle cx="16" cy="16" r="2.5" fill="#C9567A"/>
  <circle cx="16" cy="16" r="1" fill="#FDEEF4"/>
  <!-- Gold cardinal dots -->
  <circle cx="16" cy="9.5" r="1" fill="#C4922A"/>
  <circle cx="22.5" cy="16" r="1" fill="#C4922A"/>
  <circle cx="16" cy="22.5" r="1" fill="#C4922A"/>
  <circle cx="9.5" cy="16" r="1" fill="#C4922A"/>
</svg>