<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Decorative mandala-inspired mark -->
  <g transform="translate(30,30)">
    <!-- Outer petal ring -->
    <circle cx="0" cy="0" r="22" stroke="#8B1A4A" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- 8 petals -->
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(45)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(90)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(135)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(225)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(270)"/>
    <ellipse cx="0" cy="-16" rx="3.5" ry="7" fill="#8B1A4A" opacity="0.6" transform="rotate(315)"/>
    <!-- Inner dot cluster -->
    <circle cx="0" cy="0" r="5.5" fill="#8B1A4A"/>
    <circle cx="0" cy="0" r="3" fill="#C9567A"/>
    <circle cx="0" cy="0" r="1.2" fill="#FDEEF4"/>
    <!-- Gold accent dots at cardinal points -->
    <circle cx="0" cy="-10" r="1.4" fill="#C4922A"/>
    <circle cx="10" cy="0" r="1.4" fill="#C4922A"/>
    <circle cx="0" cy="10" r="1.4" fill="#C4922A"/>
    <circle cx="-10" cy="0" r="1.4" fill="#C4922A"/>
  </g>
  <!-- Wordmark: "Ethnic Story" -->
  <text x="62" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" letter-spacing="2" fill="#8B1A4A">ETHNIC</text>
  <text x="62" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="400" letter-spacing="4" fill="#5C1A2E">STORY</text>
  <!-- Thin decorative rule between the two words -->
  <line x1="62" y1="29" x2="178" y2="29" stroke="#C4922A" stroke-width="0.8" opacity="0.7"/>
</svg>